<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FeelFamous Basecamp — Lockscreen</title>
<script src="qrcode.js"></script>
<style>
  @font-face{font-family:'Crimson Pro';font-style:italic;font-weight:300;src:url('fonts/CrimsonPro-300italic.ttf') format('truetype')}
  @font-face{font-family:'Crimson Pro';font-style:normal;font-weight:300;src:url('fonts/CrimsonPro-300.ttf') format('truetype')}
  @font-face{font-family:'Crimson Pro';font-style:normal;font-weight:600;src:url('fonts/CrimsonPro-600.ttf') format('truetype')}
  @font-face{font-family:'Space Mono';font-style:normal;font-weight:400;src:url('fonts/SpaceMono-400.ttf') format('truetype')}
  @font-face{font-family:'Space Mono';font-style:normal;font-weight:700;src:url('fonts/SpaceMono-700.ttf') format('truetype')}

  *{margin:0;padding:0;box-sizing:border-box}

  body{
    background:#12100a;
    color:#f8f0de;
    font-family:'Crimson Pro',Georgia,serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 24px;
  }

  body::before{
    content:'';
    position:fixed;inset:0;
    background:radial-gradient(ellipse 60% 40% at 50% 110%,rgba(212,137,31,0.22) 0%,transparent 60%),
               radial-gradient(ellipse 30% 20% at 50% 105%,rgba(232,93,32,0.12) 0%,transparent 50%);
    pointer-events:none;
  }

  .card{
    position:relative;
    max-width:420px;
    width:100%;
    text-align:center;
  }

  .flame{font-size:48px;display:block;margin-bottom:16px}

  h1{
    font-family:'Crimson Pro',serif;
    font-weight:300;
    font-size:2.8rem;
    line-height:1.1;
    color:#f8f0de;
    margin-bottom:6px;
  }
  h1 em{font-style:italic;color:#f0b830}

  .tagline{
    font-style:italic;
    color:#b8a88a;
    font-size:1.1rem;
    margin-bottom:36px;
  }

  .qr-wrap{
    background:#f8f0de;
    border-radius:16px;
    padding:20px;
    display:inline-block;
    margin-bottom:32px;
  }

  .qr-wrap canvas{display:block}

  .divider{
    width:60px;height:1px;
    background:linear-gradient(90deg,transparent,#d4891f,transparent);
    margin:0 auto 28px;
  }

  .type-it-in{
    font-family:'Space Mono',monospace;
    font-size:0.65rem;
    letter-spacing:3px;
    text-transform:uppercase;
    color:#b8a88a;
    margin-bottom:10px;
  }

  .url{
    font-family:'Space Mono',monospace;
    font-size:1rem;
    font-weight:700;
    color:#f0b830;
    letter-spacing:1px;
    word-break:break-all;
    margin-bottom:28px;
  }

  .divider2{
    width:40px;height:1px;
    background:linear-gradient(90deg,transparent,#d4891f,transparent);
    margin:0 auto 24px;
  }

  .or-scan{
    font-family:'Space Mono',monospace;
    font-size:0.6rem;
    letter-spacing:3px;
    text-transform:uppercase;
    color:#b8a88a;
    margin-bottom:10px;
  }

  .scan-hint{
    font-style:italic;
    color:#b8a88a;
    font-size:0.95rem;
    line-height:1.6;
  }

  .footer{
    margin-top:36px;
    font-family:'Space Mono',monospace;
    font-size:0.6rem;
    letter-spacing:3px;
    text-transform:uppercase;
    color:#2e2818;
  }
</style>
</head>
<body>
<div class="card">
  <span class="flame">🔥</span>
  <h1>Feel<em>Famous</em></h1>
  <p class="tagline">Your cannabis travel companion</p>

  <div class="qr-wrap">
    <div id="qr"></div>
  </div>

  <div class="divider"></div>

  <p class="type-it-in">Or type it in later</p>
  <p class="url">feelfamous-basecamp.netlify.app</p>

  <div class="divider2"></div>

  <p class="or-scan">Scan the QR · visit the site · join the tribe</p>
  <p class="scan-hint">Patient reviews · trusted strains<br>the real guide to reality</p>

  <p class="footer">feelfamous.co.uk</p>
</div>

<script>
  new QRCode(document.getElementById("qr"), {
    text: "https://feelfamous-basecamp.netlify.app/",
    width: 220,
    height: 220,
    colorDark: "#12100a",
    colorLight: "#f8f0de",
    correctLevel: QRCode.CorrectLevel.H
  });
</script>
</body>
</html>
